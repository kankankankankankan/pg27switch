name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS binary
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build arm64
        run: |
          ARCH=arm64 MACOS_TARGET=12.0 ./macos/build.sh
          mkdir -p dist
          cp build/pg27switch dist/pg27switch-arm64

      - name: Build x86_64
        run: |
          rm -rf build
          ARCH=x86_64 MACOS_TARGET=12.0 ./macos/build.sh
          cp build/pg27switch dist/pg27switch-x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            dist/pg27switch-arm64 \
            dist/pg27switch-x86_64 \
            -output dist/pg27switch
          chmod +x dist/pg27switch
          lipo -info dist/pg27switch

      - name: Package
        run: |
          cd dist
          zip pg27switch-macos-universal.zip pg27switch
          shasum -a 256 pg27switch-macos-universal.zip > pg27switch-macos-universal.zip.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg27switch-macos-universal
          path: |
            dist/pg27switch-macos-universal.zip
            dist/pg27switch-macos-universal.zip.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/pg27switch-macos-universal.zip \
            dist/pg27switch-macos-universal.zip.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --notes "macOS universal build for pg27switch."
